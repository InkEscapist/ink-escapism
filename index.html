<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ink Escapism</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white">
<div id="root"></div>

<script type="text/babel">
const ADMIN_PASSWORD = "changeme";

function App(){
  const [books,setBooks] = React.useState(()=>{
    const saved = localStorage.getItem("inkescapism");
    return saved ? JSON.parse(saved) : [];
  });

  React.useEffect(()=>{
    localStorage.setItem("inkescapism", JSON.stringify(books));
  },[books]);

  const hash = window.location.hash;

  if(hash.startsWith("#/admin")){
    return <Admin books={books} setBooks={setBooks}/>;
  }

  if(hash.startsWith("#/book/")){
    const id = hash.split("/")[2];
    return <Book books={books} id={id}/>;
  }

  return <Home books={books}/>;
}

function Home({books}){
  return (
    <div className="max-w-5xl mx-auto p-4">
      <h1 className="text-3xl font-bold mb-4">Ink Escapism</h1>
      {books.map(b=>(
        <div key={b.id} className="border p-3 mb-2 rounded">
          <a href={`#/book/${b.id}`} className="text-lg font-semibold">{b.title}</a>
        </div>
      ))}
    </div>
  )
}

function Book({books,id}){
  const book = books.find(b=>b.id===id);
  if(!book) return <div>Not found</div>;
  return (
    <div className="max-w-3xl mx-auto p-4">
      <h1 className="text-2xl font-bold mb-4">{book.title}</h1>
      {book.patreon && (
        <a href={book.patreon} target="_blank"
          className="block bg-purple-600 text-white text-center py-2 mb-4 rounded">
          Read Advanced Chapters
        </a>
      )}
      {book.chapters?.map((c,i)=>(
        <div key={i} className="border p-2 mb-2 rounded">
          <strong>{c.title}</strong>
          <p className="whitespace-pre-wrap">{c.content}</p>
        </div>
      ))}
    </div>
  )
}

function Admin({books,setBooks}){
  const [logged,setLogged] = React.useState(false);
  const [pass,setPass] = React.useState("");
  const [title,setTitle] = React.useState("");

  if(!logged){
    return (
      <div className="max-w-md mx-auto p-4">
        <input type="password"
          className="border p-2 w-full"
          onChange={e=>setPass(e.target.value)}/>
        <button
          onClick={()=>pass===ADMIN_PASSWORD && setLogged(true)}
          className="mt-2 bg-black text-white px-4 py-2">
          Login
        </button>
      </div>
    )
  }

  function addBook(){
    setBooks([...books,{
      id: Date.now().toString(),
      title,
      chapters: []
    }])
  }

  function addChapter(id){
    const title = prompt("Chapter title");
    const content = prompt("Content");
    setBooks(books.map(b=>
      b.id===id ? {...b, chapters:[...b.chapters,{title,content}]} : b
    ))
  }

  return (
    <div className="max-w-4xl mx-auto p-4">
      <h1 className="text-xl mb-4">Admin</h1>
      <input className="border p-2 w-full mb-2"
        placeholder="Book title"
        onChange={e=>setTitle(e.target.value)}/>
      <button onClick={addBook}
        className="bg-black text-white px-4 py-2">
        Add Book
      </button>

      {books.map(b=>(
        <div key={b.id} className="border p-3 mt-3">
          {b.title}
          <button
            onClick={()=>addChapter(b.id)}
            className="ml-3 text-blue-600">
            Add Chapter
          </button>
        </div>
      ))}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
