<script type="text/babel">

/* ─── GitHub config ────────────────────────────────────────── */
// Token is never stored in this file. It is entered by the admin at publish time
// and kept only in memory for that session.
const GH_USER    = "InkEscapist";
const GH_REPO    = "ink-escapism";
const GH_FILE    = "books.json";
const GH_API     = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
const GH_RAW     = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${GH_FILE}`;

async function ghLoad() {
  try {
    const res = await fetch(GH_RAW + "?t=" + Date.now());
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function ghSave(data, token) {
  // Get current SHA (needed to update existing file)
  let sha = null;
  try {
    const info = await fetch(GH_API, {
      headers: { "Authorization": "token " + token }
    });
    if (info.ok) {
      const j = await info.json();
      sha = j.sha;
    }
  } catch {}

  const body = {
    message: "Update books " + new Date().toISOString(),
    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
    branch: "main"
  };
  if (sha) body.sha = sha;

  const res = await fetch(GH_API, {
    method: "PUT",
    headers: {
      "Authorization": "token " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || "GitHub save failed");
  }
  return true;
}

/* ─── Storage ─────────────────────────────────────────────── */
function useStorage() {
  const [data, setDataRaw] = React.useState({ books: [] });
  const [synced, setSynced] = React.useState(false);
  const [syncMsg, setSyncMsg] = React.useState("⏳ Loading your books…");

  // On first load, fetch from GitHub
  React.useEffect(() => {
    async function init() {
      try {
        const remote = await ghLoad();
        if (remote && remote.books) {
          setDataRaw(remote);
          // also cache locally
          try { localStorage.setItem("ink-data-v2", JSON.stringify(remote)); } catch {}
          setSyncMsg("✅ Books loaded!");
        } else {
          // fall back to local cache
          try {
            const local = localStorage.getItem("ink-data-v2");
            if (local) setDataRaw(JSON.parse(local));
          } catch {}
          setSyncMsg("");
        }
      } catch {
        try {
          const local = localStorage.getItem("ink-data-v2");
          if (local) setDataRaw(JSON.parse(local));
        } catch {}
        setSyncMsg("⚠️ Could not load from cloud. Using local data.");
      }
      setSynced(true);
      setTimeout(() => setSyncMsg(""), 3000);
    }
    init();
  }, []);

  async function setData(newData) {
    setDataRaw(newData);
    try { localStorage.setItem("ink-data-v2", JSON.stringify(newData)); } catch {}
  }

  // Token is held in memory only — never written to the file or localStorage
  const sessionToken = React.useRef(null);

  async function pushToGitHub(newData) {
    // Ask for token if we don't have one for this session
    if (!sessionToken.current) {
      const t = window.prompt(
        "Enter your GitHub Personal Access Token to publish.\n\nThis is kept in memory only and forgotten when you close the tab."
      );
      if (!t || !t.trim()) {
        setSyncMsg("⚠️ Publish cancelled — no token entered.");
        setTimeout(() => setSyncMsg(""), 4000);
        return;
      }
      sessionToken.current = t.trim();
    }

    setSyncMsg("☁️ Publishing to GitHub…");
    try {
      await ghSave(newData || data, sessionToken.current);
      setSyncMsg("✅ Published! Readers can see your changes.");
    } catch(e) {
      // Clear cached token on failure so they can re-enter a correct one
      sessionToken.current = null;
      setSyncMsg("⚠️ Publish failed: " + e.message);
    }
    setTimeout(() => setSyncMsg(""), 5000);
  }

  return [data, setData, pushToGitHub, syncMsg, synced];
}

/* ─── Dark mode context ───────────────────────────────────── */
const DarkCtx = React.createContext(false);

/* ─── Header ──────────────────────────────────────────────── */
function Header({ dark, setDark }) {
  const route = location.hash;
  return (
    <header style={{ borderBottom: '1px solid var(--ink-border)' }}>
      <div className="text-center py-10">
        <h1 className="title-font text-5xl mb-1" style={{ color: 'var(--ink-text)' }}>
          Ink Escapism
        </h1>
        <p style={{ color: 'var(--ink-muted)', fontSize: 14 }}>Chinese Webnovel Translations</p>
      </div>
      <img src="header-art.jpg"
           style={{ width: '100%', display: 'block', objectFit: 'contain', maxHeight: '420px', background: 'var(--ink-bg)' }}
           onError={e => e.target.style.display='none'} />
      <div className="flex items-center justify-between px-6 py-3" style={{ maxWidth: 900, margin: '0 auto' }}>
        <nav className="flex gap-1">
          <a className="nav-link" href="#">Home</a>
          <a className="nav-link" href="#/admin">Admin</a>
        </nav>
        <button
          onClick={() => setDark(!dark)}
          style={{
            background: 'transparent',
            border: '1px solid var(--ink-border)',
            color: 'var(--ink-text)',
            borderRadius: 8,
            padding: '5px 14px',
            fontSize: 13,
            cursor: 'pointer'
          }}>
          {dark ? '☀ Light' : '☾ Dark'}
        </button>
      </div>
    </header>
  );
}

/* ─── Home ────────────────────────────────────────────────── */
function Home({ data }) {
  // Track site visit
  React.useEffect(() => {
    try {
      const visitKey = 'ink-visits-v1';
      const visits = JSON.parse(localStorage.getItem(visitKey) || '[]');
      const today = new Date().toISOString().slice(0, 10);
      const sessionKey = 'ink-session-visited-' + today;
      if (!sessionStorage.getItem(sessionKey)) {
        visits.push(today);
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 90);
        const filtered = visits.filter(d => new Date(d) >= cutoff);
        localStorage.setItem(visitKey, JSON.stringify(filtered));
        sessionStorage.setItem(sessionKey, '1');
      }
    } catch {}
  }, []);
  const section = s => data.books.filter(b => b.status === s);
  // Check if we're on a "more" sub-page e.g. #/more/ongoing
  const route = location.hash;
  if (route.startsWith('#/more/')) {
    const statusSlug = route.split('/')[2];
    const labelMap = { ongoing: 'Ongoing Translations', completed: 'Completed Translations', upcoming: 'Upcoming Translations' };
    return <MoreBooksPage books={section(statusSlug)} title={labelMap[statusSlug] || statusSlug} status={statusSlug} />;
  }
  return (
    <div style={{ maxWidth: 960, margin: '0 auto', padding: '32px 16px' }}>
      <BookSection title="Ongoing Translations"  books={section("ongoing")}  status="ongoing"  />
      <BookSection title="Completed Translations" books={section("completed")} status="completed" />
      <BookSection title="Upcoming Translations"  books={section("upcoming")}  status="upcoming"  />
      {!data.books.length &&
        <p style={{ color: 'var(--ink-muted)', textAlign: 'center', marginTop: 80, fontSize: 16 }}>
          No books yet. Head to Admin to add some.
        </p>
      }
    </div>
  );
}

/* ─── More Books Page ─────────────────────────────────────── */
function MoreBooksPage({ books, title, status }) {
  const [sort, setSort] = React.useState('alpha');
  const canPopularity = status === 'ongoing' || status === 'completed';

  const sorted = React.useMemo(() => {
    const b = [...books];
    if (sort === 'alpha') b.sort((a, z) => a.title.localeCompare(z.title));
    if (sort === 'alpha-z') b.sort((a, z) => z.title.localeCompare(a.title));
    if (sort === 'popular') b.sort((a, z) => (z.popularity || 0) - (a.popularity || 0));
    return b;
  }, [books, sort]);

  return (
    <div style={{ maxWidth: 960, margin: '0 auto', padding: '32px 16px' }}>
      <a href="#" style={{ color: 'var(--ink-muted)', fontSize: 13, textDecoration: 'none' }}>← Back to home</a>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginTop: 20, marginBottom: 24 }}>
        <h2 style={{ fontSize: 24, fontWeight: 800, color: 'var(--ink-text)', margin: 0 }}>{title}</h2>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button
            onClick={() => setSort(sort === 'alpha' ? 'alpha-z' : 'alpha')}
            style={{
              background: sort.startsWith('alpha') ? 'var(--ink-accent)' : 'var(--ink-card)',
              color: sort.startsWith('alpha') ? 'var(--ink-accent-text)' : 'var(--ink-text)',
              border: '1px solid var(--ink-border)', borderRadius: 8,
              padding: '7px 14px', fontSize: 13, cursor: 'pointer', fontWeight: 600
            }}>
            {sort === 'alpha-z' ? 'A→Z ↑ Z→A' : 'A→Z'}
          </button>
          {canPopularity &&
            <button
              onClick={() => setSort('popular')}
              style={{
                background: sort === 'popular' ? 'var(--ink-accent)' : 'var(--ink-card)',
                color: sort === 'popular' ? 'var(--ink-accent-text)' : 'var(--ink-text)',
                border: '1px solid var(--ink-border)', borderRadius: 8,
                padding: '7px 14px', fontSize: 13, cursor: 'pointer', fontWeight: 600
              }}>
              Most Popular
            </button>
          }
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(180px,1fr))', gap: 20 }}>
        {sorted.map(b => <BookCard key={b.id} b={b} />)}
      </div>
      {!sorted.length && <p style={{ color: 'var(--ink-muted)', textAlign: 'center', marginTop: 60 }}>No books in this section yet.</p>}
    </div>
  );
}

/* ─── Book Card (shared) ──────────────────────────────────── */
function BookCard({ b }) {
  return (
    <a href={`#/book/${b.id}`}
      style={{
        display: 'block',
        border: '1px solid var(--ink-border)',
        borderRadius: 12,
        overflow: 'hidden',
        textDecoration: 'none',
        color: 'var(--ink-text)',
        background: 'var(--ink-card)',
        transition: 'box-shadow 0.2s, transform 0.2s',
      }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow='0 8px 30px rgba(0,0,0,0.1)'; e.currentTarget.style.transform='translateY(-2px)'; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow='none'; e.currentTarget.style.transform='none'; }}>
      {b.cover
        ? <img src={b.cover} style={{ width: '100%', height: 200, objectFit: 'cover', display: 'block' }} />
        : <div style={{ width: '100%', height: 200, background: 'var(--ink-border)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontSize: 40 }}>📖</span>
          </div>
      }
      <div style={{ padding: '12px 14px' }}>
        <div style={{ marginBottom: 4 }}>
          <span className={`badge badge-${b.status}`}>{b.status}</span>
        </div>
        <h3 style={{ fontWeight: 700, fontSize: 15, marginBottom: 2 }}>{b.title}</h3>

/* ─── Comments storage (separate from book data) ──────────── */
function useComments(bookId, chapterIdx) {
  const key = `ink-comments-${bookId}-${chapterIdx}`;
  const [comments, setComments] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch { return []; }
  });
  // Reload whenever chapter changes
  React.useEffect(() => {
    try { setComments(JSON.parse(localStorage.getItem(key)) || []); }
    catch { setComments([]); }
  }, [key]);
  function save(next) {
    setComments(next);
    localStorage.setItem(key, JSON.stringify(next));
  }
  return [comments, save];
}

/* ─── Comment Section ─────────────────────────────────────── */
function CommentSection({ bookId, chapterIdx }) {
  const [comments, save] = useComments(bookId, chapterIdx);
  const [name, setName]   = React.useState('');
  const [text, setText]   = React.useState('');
  const [likedIds, setLikedIds] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ink-likes')) || {}; }
    catch { return {}; }
  });
  const [err, setErr] = React.useState('');

  function submit() {
    if (!name.trim()) { setErr('Please enter a name.'); return; }
    if (!text.trim()) { setErr('Please write something.'); return; }
    const comment = {
      id: Date.now().toString(),
      name: name.trim(),
      text: text.trim(),
      likes: 0,
      ts: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
    };
    save([...comments, comment]);
    setText('');
    setErr('');
  }

  function toggleLike(id) {
    const already = likedIds[id];
    const nextLiked = { ...likedIds, [id]: !already };
    setLikedIds(nextLiked);
    localStorage.setItem('ink-likes', JSON.stringify(nextLiked));
    save(comments.map(c =>
      c.id === id ? { ...c, likes: (c.likes || 0) + (already ? -1 : 1) } : c
    ));
  }

  function deleteComment(id) {
    save(comments.filter(c => c.id !== id));
  }

  return (
    <div style={{ marginTop: 48 }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
        <div style={{ flex: 1, height: 1, background: 'var(--ink-border)' }} />
        <span style={{ fontSize: 13, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-muted)', whiteSpace: 'nowrap' }}>
          💬 {comments.length} Comment{comments.length !== 1 ? 's' : ''}
        </span>
        <div style={{ flex: 1, height: 1, background: 'var(--ink-border)' }} />
      </div>

      {/* Existing comments */}
      {comments.length === 0 &&
        <p style={{ color: 'var(--ink-muted)', fontSize: 14, textAlign: 'center', marginBottom: 20 }}>
          Be the first to comment on this chapter!
        </p>
      }
      {comments.map(c => (
        <div key={c.id} className="comment-bubble">
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {/* Avatar */}
              <div style={{
                width: 32, height: 32, borderRadius: '50%',
                background: `hsl(${[...c.name].reduce((a,ch)=>a+ch.charCodeAt(0),0) % 360}, 60%, 70%)`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 13, color: '#fff', flexShrink: 0,
              }}>
                {c.name.charAt(0).toUpperCase()}
              </div>
              <div>
                <span style={{ fontWeight: 700, fontSize: 14 }}>{c.name}</span>
                <span style={{ color: 'var(--ink-muted)', fontSize: 12, marginLeft: 8 }}>{c.ts}</span>
              </div>
            </div>
            <button onClick={() => deleteComment(c.id)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-muted)', fontSize: 16, lineHeight: 1, padding: '0 4px' }}
              title="Delete comment">×</button>
          </div>
          <p style={{ fontSize: 14, lineHeight: 1.7, margin: '0 0 10px 40px', color: 'var(--ink-text)', whiteSpace: 'pre-wrap' }}>{c.text}</p>
          <div style={{ marginLeft: 40 }}>
            <button className={`like-btn${likedIds[c.id] ? ' liked' : ''}`} onClick={() => toggleLike(c.id)}>
              {likedIds[c.id] ? '♥' : '♡'} {c.likes || 0}
            </button>
          </div>
        </div>
      ))}

      {/* New comment form */}
      <div style={{ border: '1px solid var(--ink-border)', borderRadius: 14, padding: 16, background: 'var(--ink-card)', marginTop: 8 }}>
        <p style={{ fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Leave a comment</p>
        <input
          className="comment-input"
          placeholder="Your name"
          value={name}
          onChange={e => setName(e.target.value)}
          style={{ marginBottom: 10, borderRadius: 8, padding: '8px 12px' }}
        />
        <textarea
          className="comment-input"
          placeholder="Share your thoughts on this chapter…"
          rows={3}
          value={text}
          onChange={e => setText(e.target.value)}
          style={{ marginBottom: err ? 6 : 12 }}
        />
        {err && <p style={{ color: '#dc2626', fontSize: 12, marginBottom: 8 }}>{err}</p>}
        <button className="btn-primary" onClick={submit}>Post Comment</button>
      </div>
    </div>
  );
}

/* ─── Reader ──────────────────────────────────────────────── */
function Reader({ data }) {
  const parts = location.hash.split("/");
  const id = parts[2];
  const chIdx = parts[3] !== undefined ? parseInt(parts[3]) : 0;
  const book = data.books.find(b => b.id === id);
  const [showIndex, setShowIndex] = React.useState(false);

  React.useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [id, chIdx]);

  // ── Track chapter read in localStorage for admin analytics ──
  React.useEffect(() => {
    if (!book) return;
    try {
      const key = 'ink-reads-v1';
      const reads = JSON.parse(localStorage.getItem(key) || '{}');
      reads[book.id] = (reads[book.id] || 0) + 1;
      localStorage.setItem(key, JSON.stringify(reads));

      // Also log a daily visit stamp
      const visitKey = 'ink-visits-v1';
      const visits = JSON.parse(localStorage.getItem(visitKey) || '[]');
      const today = new Date().toISOString().slice(0, 10);
      // Only add one visit entry per day per session
      const sessionKey = 'ink-session-visited-' + today;
      if (!sessionStorage.getItem(sessionKey)) {
        visits.push(today);
        // Keep only last 90 days
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 90);
        const filtered = visits.filter(d => new Date(d) >= cutoff);
        localStorage.setItem(visitKey, JSON.stringify(filtered));
        sessionStorage.setItem(sessionKey, '1');
      }
    } catch {}
  }, [id, chIdx]);

  if (!book) return <div style={{ padding: 40, textAlign: 'center', color: 'var(--ink-muted)' }}>Book not found.</div>;
  const chapters = book.chapters || [];
  if (!chapters.length) return (
    <div style={{ padding: 60, textAlign: 'center', color: 'var(--ink-muted)' }}>
      <p>No chapters yet.</p>
      <a href={`#/book/${book.id}`} style={{ color: 'var(--ink-text)', fontSize: 13, textDecoration: 'none' }}>← Back to book</a>
    </div>
  );

  const current = Math.max(0, Math.min(chIdx, chapters.length - 1));
  const chapter = chapters[current];
  const isFirst = current === 0;
  const isLast  = current === chapters.length - 1;

  const navBar = (top) => (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      gap: 8, padding: '12px 0',
      borderTop: top ? 'none' : '1px solid var(--ink-border)',
      borderBottom: top ? '1px solid var(--ink-border)' : 'none',
      marginBottom: top ? 28 : 0, marginTop: top ? 0 : 28,
    }}>
      {/* Prev */}
      <a href={isFirst ? `#/book/${book.id}` : `#/read/${book.id}/${current - 1}`}
        style={{
          display: 'flex', alignItems: 'center', gap: 6,
          padding: '8px 14px', borderRadius: 8,
          border: '1px solid var(--ink-border)',
          background: 'var(--ink-card)', color: 'var(--ink-text)',
          textDecoration: 'none', fontSize: 13, fontWeight: 600,
          opacity: 1, whiteSpace: 'nowrap',
        }}>
        ← {isFirst ? 'Book page' : 'Prev'}
      </a>

      {/* Chapter index toggle */}
      <button onClick={() => setShowIndex(s => !s)}
        style={{
          flex: 1, padding: '8px 10px', borderRadius: 8,
          border: '1px solid var(--ink-border)',
          background: showIndex ? 'var(--ink-accent)' : 'var(--ink-card)',
          color: showIndex ? 'var(--ink-accent-text)' : 'var(--ink-muted)',
          fontSize: 13, cursor: 'pointer', fontWeight: 600,
          maxWidth: 220, margin: '0 auto',
        }}>
        ☰ Ch. {current + 1} / {chapters.length}
      </button>

      {/* Next */}
      {isLast ? (
        <span style={{
          padding: '8px 14px', borderRadius: 8,
          border: '1px solid var(--ink-border)',
          background: 'var(--ink-card)', color: 'var(--ink-muted)',
          fontSize: 13, fontWeight: 600, whiteSpace: 'nowrap',
        }}>End ✓</span>
      ) : (
        <a href={`#/read/${book.id}/${current + 1}`}
          style={{
            display: 'flex', alignItems: 'center', gap: 6,
            padding: '8px 14px', borderRadius: 8,
            border: '1px solid var(--ink-border)',
            background: 'var(--ink-card)', color: 'var(--ink-text)',
            textDecoration: 'none', fontSize: 13, fontWeight: 600, whiteSpace: 'nowrap',
          }}>
          Next →
        </a>
      )}
    </div>
  );

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '32px 16px' }}>
      {/* Book breadcrumb */}
      <a href={`#/book/${book.id}`}
        style={{ color: 'var(--ink-muted)', fontSize: 13, textDecoration: 'none', display: 'inline-block', marginBottom: 12 }}>
        ← {book.title}
      </a>

      {/* Top nav */}
      {navBar(true)}

      {/* Chapter index panel */}
      {showIndex && (
        <div style={{
          border: '1px solid var(--ink-border)', borderRadius: 12,
          background: 'var(--ink-card)', padding: 16, marginBottom: 24,
          maxHeight: 320, overflowY: 'auto',
        }}>
          <p style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-muted)', marginBottom: 10 }}>
            Chapter Index
          </p>
          {chapters.map((c, i) => (
            <a key={i}
              href={`#/read/${book.id}/${i}`}
              onClick={() => setShowIndex(false)}
              style={{
                display: 'block', padding: '7px 10px', borderRadius: 8,
                textDecoration: 'none', fontSize: 14,
                color: i === current ? 'var(--ink-accent-text)' : 'var(--ink-text)',
                background: i === current ? 'var(--ink-accent)' : 'transparent',
                fontWeight: i === current ? 700 : 400,
                marginBottom: 2,
              }}>
              {i + 1}. {c.title}
              {i === current && <span style={{ marginLeft: 8, fontSize: 11, opacity: 0.7 }}>← reading</span>}
            </a>
          ))}
        </div>
      )}

      {/* Chapter content */}
      <div className="no-select" onContextMenu={e => e.preventDefault()}>
        <h2 style={{ fontSize: 24, fontWeight: 800, marginBottom: 24, lineHeight: 1.3 }}>
          Chapter {current + 1}: {chapter.title}
        </h2>
        <div style={{ lineHeight: 1.95, fontSize: 16.5, whiteSpace: 'pre-wrap', color: 'var(--ink-text)' }}>
          {chapter.content}
        </div>
      </div>

      {/* Patreon CTA on last chapter */}
      {isLast && book.patreon && book.showPatreonOnLast && (
        <div style={{
          marginTop: 48, padding: 28,
          background: 'var(--ink-card)', borderRadius: 16,
          border: '1px solid var(--ink-border)', textAlign: 'center',
        }}>
          <p style={{ fontWeight: 800, fontSize: 18, marginBottom: 6 }}>You've reached the latest chapter! 🎉</p>
          <p style={{ color: 'var(--ink-muted)', fontSize: 14, marginBottom: 20 }}>
            Support the translator and read ahead on Patreon.
          </p>
          <a href={book.patreon} target="_blank" className="patreon-btn" style={{ maxWidth: 380, margin: '0 auto' }}>
            🔥 Read Advanced Chapters on Patreon
          </a>
        </div>
      )}

      {/* Bottom nav */}
      {navBar(false)}

      {/* Mid-chapter rotating recommendation (all chapters except last) */}
      {!isLast && <ChapterRecommendation book={book} allBooks={data.books} chapterIndex={current} />}

      {/* Comments — every chapter */}
      <CommentSection bookId={book.id} chapterIdx={current} />

      {/* All recommendations — last chapter only */}
      {isLast && <AllRecommendations book={book} allBooks={data.books} />}
    </div>
  );
}

/* ─── Analytics Dashboard ─────────────────────────────────── */
function AnalyticsDashboard({ data }) {
  // Load read counts
  const reads = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem('ink-reads-v1') || '{}'); }
    catch { return {}; }
  }, []);

  // Load daily visits (last 30 days)
  const visitData = React.useMemo(() => {
    try {
      const raw = JSON.parse(localStorage.getItem('ink-visits-v1') || '[]');
      // Count per day
      const counts = {};
      raw.forEach(d => { counts[d] = (counts[d] || 0) + 1; });
      // Build last 30 days
      const days = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        days.push({ date: key, label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), count: counts[key] || 0 });
      }
      return days;
    } catch { return []; }
  }, []);

  const totalVisits = visitData.reduce((s, d) => s + d.count, 0);
  const last7 = visitData.slice(-7).reduce((s, d) => s + d.count, 0);
  const maxVisits = Math.max(...visitData.map(d => d.count), 1);

  // Book leaderboard sorted by reads
  const bookStats = data.books.map(b => ({
    ...b,
    readCount: reads[b.id] || 0,
    chapterCount: (b.chapters || []).length,
  })).sort((a, z) => z.readCount - a.readCount);

  const totalReads = Object.values(reads).reduce((s, v) => s + v, 0);
  const maxReads = Math.max(...bookStats.map(b => b.readCount), 1);

  const statBox = (label, value, sub, color) => (
    <div style={{
      flex: 1, minWidth: 130,
      border: '1px solid var(--ink-border)',
      borderRadius: 14, background: 'var(--ink-card)',
      padding: '18px 20px',
    }}>
      <div style={{ fontSize: 28, fontWeight: 800, color: color || 'var(--ink-text)' }}>{value}</div>
      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-text)', marginTop: 2 }}>{label}</div>
      {sub && <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginTop: 3 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <h3 style={{ fontWeight: 800, fontSize: 20, marginBottom: 6, color: 'var(--ink-text)' }}>📊 Site Analytics</h3>
      <p style={{ fontSize: 13, color: 'var(--ink-muted)', marginBottom: 24, lineHeight: 1.6 }}>
        Visits and reads are tracked locally from readers' browsers on your site.{' '}
        <strong>Note:</strong> these numbers reflect activity on this device/browser.
        For full cross-device traffic, see your{' '}
        <a href="https://goatcounter.com" target="_blank" style={{ color: '#7c3aed' }}>GoatCounter dashboard</a>{' '}
        once you set up the code in the site's &lt;head&gt;.
      </p>

      {/* Stat boxes */}
      <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 28 }}>
        {statBox('Visits (30 days)', totalVisits, 'Unique daily sessions', '#7c3aed')}
        {statBox('Visits (7 days)', last7, 'This week', '#7c3aed')}
        {statBox('Total Chapter Reads', totalReads, 'All books combined', '#059669')}
        {statBox('Books Published', data.books.length, `${data.books.filter(b=>b.status==='ongoing').length} ongoing`, 'var(--ink-text)')}
      </div>

      {/* Visit chart – last 30 days */}
      <div style={{ border: '1px solid var(--ink-border)', borderRadius: 14, background: 'var(--ink-card)', padding: '20px 20px 12px', marginBottom: 28 }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: 'var(--ink-text)' }}>📈 Daily Visits – Last 30 Days</div>
        {totalVisits === 0 ? (
          <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--ink-muted)', fontSize: 14 }}>
            No visit data yet. Data will appear here once readers visit your site. 🌱
          </div>
        ) : (
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 3, height: 100, overflowX: 'auto' }}>
            {visitData.map((d, i) => (
              <div key={i} style={{ flex: '0 0 auto', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, minWidth: 28 }}
                   title={`${d.date}: ${d.count} visit${d.count !== 1 ? 's' : ''}`}>
                <div style={{
                  width: 20,
                  height: d.count === 0 ? 3 : Math.max(8, Math.round((d.count / maxVisits) * 84)),
                  background: d.count === 0 ? 'var(--ink-border)' : '#7c3aed',
                  borderRadius: '4px 4px 0 0',
                  opacity: d.count === 0 ? 0.4 : 1,
                  transition: 'height 0.3s',
                }} />
                {(i === 0 || i === 14 || i === 29 || d.count === Math.max(...visitData.map(x=>x.count))) && (
                  <div style={{ fontSize: 9, color: 'var(--ink-muted)', whiteSpace: 'nowrap', transform: 'rotate(-45deg)', transformOrigin: 'top left', marginTop: 4 }}>
                    {d.label}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Book leaderboard */}
      <div style={{ border: '1px solid var(--ink-border)', borderRadius: 14, background: 'var(--ink-card)', padding: 20 }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4, color: 'var(--ink-text)' }}>🏆 Book Reads Leaderboard</div>
        <div style={{ fontSize: 13, color: 'var(--ink-muted)', marginBottom: 16 }}>Ranked by how many times a chapter has been opened.</div>

        {data.books.length === 0 ? (
          <p style={{ color: 'var(--ink-muted)', fontSize: 14 }}>No books yet. Add some to start tracking reads.</p>
        ) : bookStats.every(b => b.readCount === 0) ? (
          <p style={{ color: 'var(--ink-muted)', fontSize: 14, textAlign: 'center', padding: '20px 0' }}>
            No reads tracked yet. Reads will appear here once visitors open chapters. 📖
          </p>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {bookStats.map((b, rank) => (
              <div key={b.id} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                {/* Rank badge */}
                <div style={{
                  width: 28, height: 28, borderRadius: '50%', flexShrink: 0,
                  background: rank === 0 ? '#fde68a' : rank === 1 ? '#e5e7eb' : rank === 2 ? '#fed7aa' : 'var(--ink-border)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontWeight: 800, fontSize: 13,
                  color: rank === 0 ? '#92400e' : rank === 1 ? '#374151' : rank === 2 ? '#9a3412' : 'var(--ink-muted)',
                }}>
                  {rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : rank + 1}
                </div>

                {/* Cover */}
                {b.cover
                  ? <img src={b.cover} style={{ width: 36, height: 50, objectFit: 'cover', borderRadius: 5, flexShrink: 0 }} />
                  : <div style={{ width: 36, height: 50, background: 'var(--ink-border)', borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, flexShrink: 0 }}>📖</div>
                }

                {/* Bar + info */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{b.title}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: '#059669', flexShrink: 0, marginLeft: 8 }}>{b.readCount.toLocaleString()} reads</div>
                  </div>
                  <div style={{ height: 8, background: 'var(--ink-border)', borderRadius: 99, overflow: 'hidden' }}>
                    <div style={{
                      height: '100%',
                      width: `${Math.round((b.readCount / maxReads) * 100)}%`,
                      background: rank === 0 ? '#7c3aed' : '#a78bfa',
                      borderRadius: 99,
                      transition: 'width 0.4s ease',
                      minWidth: b.readCount > 0 ? 8 : 0,
                    }} />
                  </div>
                  <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 3 }}>
                    <span className={`badge badge-${b.status}`}>{b.status}</span>
                    {' · '}{b.chapterCount} chapter{b.chapterCount !== 1 ? 's' : ''}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* GoatCounter setup guide */}
      <div style={{ border: '1px dashed var(--ink-border)', borderRadius: 14, padding: 20, marginTop: 24 }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 8 }}>🔧 Set Up Full Analytics (GoatCounter)</div>
        <div style={{ fontSize: 13, color: 'var(--ink-muted)', lineHeight: 1.7 }}>
          <p style={{ marginBottom: 8 }}>The read counts above track activity on each device. For full cross-device visitor analytics, follow these steps:</p>
          <ol style={{ paddingLeft: 18, display: 'flex', flexDirection: 'column', gap: 6 }}>
            <li>Go to <a href="https://www.goatcounter.com" target="_blank" style={{ color: '#7c3aed' }}>goatcounter.com</a> and create a <strong>free account</strong>.</li>
            <li>During signup, choose a site code (e.g. <code style={{ background: 'var(--ink-border)', padding: '1px 5px', borderRadius: 4 }}>inkescapism</code>).</li>
            <li>Open your <code style={{ background: 'var(--ink-border)', padding: '1px 5px', borderRadius: 4 }}>index.html</code> file in a text editor.</li>
            <li>Find the line that says <code style={{ background: 'var(--ink-border)', padding: '1px 5px', borderRadius: 4 }}>YOUR-SITE-CODE</code> and replace it with your actual GoatCounter site code.</li>
            <li>Save and publish to GitHub. That's it! 🎉 View real-time traffic on your GoatCounter dashboard.</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

/* ─── Admin ───────────────────────────────────────────────── */
const ADMIN_PASSWORD = "changeme";

function Toggle({ on, onToggle, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }} onClick={onToggle}>
      <div className={`toggle-track ${on ? 'on' : ''}`}>
        <div className="toggle-thumb" />
      </div>
      <span style={{ fontSize: 14, color: 'var(--ink-text)' }}>{label}</span>
    </div>
  );
}

function AdminBookCard({ book, data, setData }) {
  const [expanded, setExpanded]               = React.useState(false);
  const [showChapterForm, setShowChapterForm]  = React.useState(false);
  const [chapForm, setChapForm]               = React.useState({ title: '', content: '' });
  const [editingIdx, setEditingIdx]           = React.useState(null);
  const [editForm, setEditForm]               = React.useState({ title: '', content: '' });
  // Book-settings editing
  const [editingBook, setEditingBook]         = React.useState(false);
  const [bookForm, setBookForm]               = React.useState({});
  // Chapter sort order: false = asc (Ch.1 first), true = desc (latest first)
  const [sortDesc, setSortDesc]               = React.useState(false);
  const bookCoverInputRef                     = React.useRef();

  function updateBook(updates) {
    setData({ ...data, books: data.books.map(b => b.id === book.id ? { ...b, ...updates } : b) });
  }
  function deleteBook() {
    if (!confirm(`Delete "${book.title}"? This cannot be undone.`)) return;
    setData({ ...data, books: data.books.filter(b => b.id !== book.id) });
  }
  function openBookEdit() {
    setBookForm({
      title: book.title || '',
      author: book.author || '',
      synopsis: book.synopsis || '',
      cover: book.cover || '',
      status: book.status || 'ongoing',
      patreon: book.patreon || '',
      showPatreonOnLast: !!book.showPatreonOnLast,
      recommendations: book.recommendations ? JSON.parse(JSON.stringify(book.recommendations)) : [],
    });
    setEditingBook(true);
  }
  function saveBookEdit() {
    if (!bookForm.title.trim()) return alert('Title cannot be empty.');
    updateBook({ ...bookForm });
    setEditingBook(false);
  }
  function handleBookCoverUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setBookForm(f => ({ ...f, cover: ev.target.result }));
    reader.readAsDataURL(file);
  }
  function addChapter() {
    if (!chapForm.title.trim()) return;
    updateBook({ chapters: [...(book.chapters || []), { ...chapForm }] });
    setChapForm({ title: '', content: '' });
    setShowChapterForm(false);
  }
  function deleteChapter(idx) {
    if (!confirm('Delete this chapter?')) return;
    updateBook({ chapters: book.chapters.filter((_, i) => i !== idx) });
    if (editingIdx === idx) setEditingIdx(null);
  }
  function moveChapter(idx, dir) {
    const chapters = [...book.chapters];
    const swap = idx + dir;
    if (swap < 0 || swap >= chapters.length) return;
    [chapters[idx], chapters[swap]] = [chapters[swap], chapters[idx]];
    updateBook({ chapters });
  }
  function startEdit(idx) {
    setEditingIdx(idx);
    setEditForm({ title: book.chapters[idx].title, content: book.chapters[idx].content });
    setShowChapterForm(false);
  }
  function saveEdit() {
    if (!editForm.title.trim()) return;
    const chapters = book.chapters.map((c, i) => i === editingIdx ? { ...c, ...editForm } : c);
    updateBook({ chapters });
    setEditingIdx(null);
  }
  function cancelEdit() { setEditingIdx(null); }

  const totalChapters = (book.chapters || []).length;
  const isLastChapter = idx => idx === totalChapters - 1;

  // Build display list with actual indices preserved
  const displayChapters = React.useMemo(() => {
    const list = (book.chapters || []).map((c, i) => ({ c, i }));
    return sortDesc ? [...list].reverse() : list;
  }, [book.chapters, sortDesc]);

  return (
    <div style={{ border: '1px solid var(--ink-border)', borderRadius: 12, background: 'var(--ink-card)', overflow: 'hidden', marginBottom: 12 }}>
      {/* Book header row */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', cursor: 'pointer' }}
           onClick={() => setExpanded(!expanded)}>
        {book.cover
          ? <img src={book.cover} style={{ width: 44, height: 60, objectFit: 'cover', borderRadius: 6, flexShrink: 0 }} />
          : <div style={{ width: 44, height: 60, background: 'var(--ink-border)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>📖</div>
        }
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>{book.title}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
            {book.author} · <span className={`badge badge-${book.status}`}>{book.status}</span>
            {' '}· {totalChapters} chapter{totalChapters !== 1 ? 's' : ''}
          </div>
        </div>
        <span style={{ color: 'var(--ink-muted)', fontSize: 18 }}>{expanded ? '▲' : '▼'}</span>
      </div>

      {expanded && (
        <div style={{ borderTop: '1px solid var(--ink-border)', padding: '16px' }}>

          {/* ── Edit Book Settings panel ── */}
          {editingBook ? (
            <div style={{ border: '2px solid #7c3aed', borderRadius: 12, padding: 16, background: 'var(--ink-bg)', marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#7c3aed', marginBottom: 14, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                ✏ Editing Book Settings
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                <div>
                  <label className="admin-label">Title *</label>
                  <input className="admin-input" value={bookForm.title}
                    onChange={e => setBookForm(f => ({ ...f, title: e.target.value }))} />
                </div>
                <div>
                  <label className="admin-label">Author</label>
                  <input className="admin-input" value={bookForm.author}
                    onChange={e => setBookForm(f => ({ ...f, author: e.target.value }))} />
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <label className="admin-label">Synopsis</label>
                <textarea className="admin-input" rows={4} value={bookForm.synopsis}
                  onChange={e => setBookForm(f => ({ ...f, synopsis: e.target.value }))} />
              </div>
              <div style={{ marginBottom: 12 }}>
                <label className="admin-label">Cover Image</label>
                <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                  <div style={{ flex: 1 }}>
                    <button className="btn-ghost" style={{ marginBottom: 6 }} onClick={() => bookCoverInputRef.current?.click()}>
                      📂 Upload from Computer
                    </button>
                    <input ref={bookCoverInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleBookCoverUpload} />
                    <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginBottom: 4 }}>— or paste URL —</div>
                    <input className="admin-input" placeholder="https://…"
                      value={bookForm.cover.startsWith('data:') ? '(uploaded image)' : bookForm.cover}
                      onChange={e => setBookForm(f => ({ ...f, cover: e.target.value }))} />
                  </div>
                  {bookForm.cover &&
                    <img src={bookForm.cover} style={{ width: 60, height: 82, objectFit: 'cover', borderRadius: 6, border: '1px solid var(--ink-border)' }}
                      onError={e => e.target.style.display='none'} />
                  }
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                <div>
                  <label className="admin-label">Status</label>
                  <select className="admin-input" value={bookForm.status}
                    onChange={e => setBookForm(f => ({ ...f, status: e.target.value }))}>
                    <option value="ongoing">Ongoing</option>
                    <option value="completed">Completed</option>
                    <option value="upcoming">Upcoming</option>
                  </select>
                </div>
                <div>
                  <label className="admin-label">Patreon Link</label>
                  <input className="admin-input" placeholder="https://patreon.com/…"
                    value={bookForm.patreon}
                    onChange={e => setBookForm(f => ({ ...f, patreon: e.target.value }))} />
                </div>
              </div>
              <div style={{ marginBottom: 16 }}>
                <Toggle
                  on={bookForm.showPatreonOnLast}
                  onToggle={() => setBookForm(f => ({ ...f, showPatreonOnLast: !f.showPatreonOnLast }))}
                  label="Show Patreon button after last chapter"
                />
              </div>

              {/* ── Recommendations ── */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-muted)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                  📖 Recommended Novels
                </div>
                <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginBottom: 10, lineHeight: 1.5 }}>
                  Pick books to recommend to readers. They'll rotate chapter-by-chapter, and all show on the last chapter.
                </div>

                {/* Existing recommendations */}
                {(bookForm.recommendations || []).map((rec, ri) => {
                  const recBook = data.books.find(b => b.id === rec.bookId);
                  return (
                    <div key={ri} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', marginBottom: 8, padding: 10, background: 'var(--ink-card)', borderRadius: 8, border: '1px solid var(--ink-border)' }}>
                      {recBook?.cover
                        ? <img src={recBook.cover} style={{ width: 36, height: 50, objectFit: 'cover', borderRadius: 4, flexShrink: 0 }} />
                        : <div style={{ width: 36, height: 50, background: 'var(--ink-border)', borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0 }}>📖</div>
                      }
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 4 }}>{recBook ? recBook.title : <span style={{ color: '#dc2626' }}>Book not found</span>}</div>
                        <textarea
                          className="admin-input"
                          placeholder="Write a short blurb to hook the reader… (optional)"
                          rows={2}
                          value={rec.blurb || ''}
                          onChange={e => {
                            const next = [...(bookForm.recommendations || [])];
                            next[ri] = { ...next[ri], blurb: e.target.value };
                            setBookForm(f => ({ ...f, recommendations: next }));
                          }}
                          style={{ fontSize: 12, padding: '6px 8px' }}
                        />
                      </div>
                      <button className="btn-danger" style={{ flexShrink: 0, marginTop: 2 }}
                        onClick={() => {
                          const next = (bookForm.recommendations || []).filter((_, j) => j !== ri);
                          setBookForm(f => ({ ...f, recommendations: next }));
                        }}>✕</button>
                    </div>
                  );
                })}

                {/* Add recommendation picker */}
                {(() => {
                  const alreadyPicked = new Set((bookForm.recommendations || []).map(r => r.bookId));
                  const available = data.books.filter(b => b.id !== book.id && !alreadyPicked.has(b.id));
                  if (!available.length) return (
                    <p style={{ fontSize: 12, color: 'var(--ink-muted)', marginTop: 4 }}>
                      {data.books.length <= 1 ? 'Add more books to your library to enable recommendations.' : 'All available books are already recommended.'}
                    </p>
                  );
                  return (
                    <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 6 }}>
                      <select
                        className="admin-input"
                        style={{ flex: 1 }}
                        defaultValue=""
                        onChange={e => {
                          if (!e.target.value) return;
                          const next = [...(bookForm.recommendations || []), { bookId: e.target.value, blurb: '' }];
                          setBookForm(f => ({ ...f, recommendations: next }));
                          e.target.value = '';
                        }}>
                        <option value="" disabled>+ Add a book to recommend…</option>
                        {available.map(b => (
                          <option key={b.id} value={b.id}>{b.title}</option>
                        ))}
                      </select>
                    </div>
                  );
                })()}
              </div>

              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn-primary" onClick={saveBookEdit}>💾 Save Settings</button>
                <button className="btn-ghost" onClick={() => setEditingBook(false)}>Cancel</button>
              </div>
            </div>
          ) : (
            <div style={{ marginBottom: 16 }}>
              <button className="btn-ghost" style={{ fontSize: 13 }} onClick={openBookEdit}>
                ⚙ Edit Book Settings (title, synopsis, Patreon…)
              </button>
            </div>
          )}

          {/* Patreon status indicator (when not editing) */}
          {!editingBook && (
            <div style={{ marginBottom: 16, padding: 14, background: 'var(--ink-bg)', borderRadius: 10, border: '1px solid var(--ink-border)' }}>
              <Toggle
                on={!!book.showPatreonOnLast}
                onToggle={() => updateBook({ showPatreonOnLast: !book.showPatreonOnLast })}
                label={book.showPatreonOnLast
                  ? '✅ Patreon button shows after last chapter'
                  : '⬜ Patreon button hidden (toggle to enable on last chapter)'
                }
              />
              {book.showPatreonOnLast && !book.patreon &&
                <p style={{ color: '#dc2626', fontSize: 12, marginTop: 8 }}>⚠ No Patreon link set — click "Edit Book Settings" to add one.</p>
              }
            </div>
          )}

          {/* ── Add chapter form (ABOVE the list) ── */}
          <div style={{ marginBottom: 16 }}>
            {showChapterForm ? (
              <div style={{ border: '1px solid var(--ink-border)', borderRadius: 10, padding: 14, background: 'var(--ink-bg)' }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-muted)', marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                  ➕ New Chapter
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label className="admin-label">Chapter Title</label>
                  <input className="admin-input" placeholder="e.g. The Beginning" value={chapForm.title}
                    onChange={e => setChapForm({ ...chapForm, title: e.target.value })} />
                </div>
                <div style={{ marginBottom: 12 }}>
                  <label className="admin-label">Chapter Content</label>
                  <textarea className="admin-input" placeholder="Paste chapter content here…" rows={8}
                    value={chapForm.content}
                    onChange={e => setChapForm({ ...chapForm, content: e.target.value })} />
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button className="btn-primary" onClick={addChapter}>Add Chapter</button>
                  <button className="btn-ghost" onClick={() => setShowChapterForm(false)}>Cancel</button>
                </div>
              </div>
            ) : (
              <button className="btn-ghost"
                onClick={() => { setShowChapterForm(true); setEditingIdx(null); }}>
                + Add Chapter
              </button>
            )}
          </div>

          {/* ── Chapters list ── */}
          <div style={{ marginBottom: 12 }}>
            {/* Header row with sort toggle */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                Chapters ({totalChapters})
              </div>
              {totalChapters > 1 && (
                <button className="btn-ghost" style={{ fontSize: 12, padding: '4px 10px' }}
                  onClick={() => setSortDesc(d => !d)}
                  title="Toggle sort order">
                  {sortDesc ? '↑ Oldest First' : '↓ Newest First'}
                </button>
              )}
            </div>

            {totalChapters === 0 &&
              <p style={{ fontSize: 13, color: 'var(--ink-muted)', marginBottom: 8 }}>No chapters yet. Use "+ Add Chapter" above.</p>
            }
            {displayChapters.map(({ c, i }) => (
              <div key={i}>
                {/* ── Edit mode ── */}
                {editingIdx === i ? (
                  <div style={{ border: '2px solid #7c3aed', borderRadius: 10, padding: 14, background: 'var(--ink-bg)', marginBottom: 8 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: '#7c3aed', marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                      ✏ Editing Chapter {i + 1}
                    </div>
                    <div style={{ marginBottom: 10 }}>
                      <label className="admin-label">Chapter Title</label>
                      <input className="admin-input" value={editForm.title}
                        onChange={e => setEditForm({ ...editForm, title: e.target.value })} />
                    </div>
                    <div style={{ marginBottom: 12 }}>
                      <label className="admin-label">Chapter Content</label>
                      <textarea className="admin-input" rows={10}
                        value={editForm.content}
                        onChange={e => setEditForm({ ...editForm, content: e.target.value })} />
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button className="btn-primary" onClick={saveEdit}>💾 Save Changes</button>
                      <button className="btn-ghost" onClick={cancelEdit}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  /* ── Normal view ── */
                  <div className="chapter-card" style={{ marginBottom: 8 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      {/* Order controls — always operate on actual array indices */}
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 2, flexShrink: 0 }}>
                        <button className="btn-ghost" style={{ padding: '2px 7px', fontSize: 11 }}
                          onClick={() => moveChapter(i, -1)} disabled={i === 0} title="Move up in list">▲</button>
                        <button className="btn-ghost" style={{ padding: '2px 7px', fontSize: 11 }}
                          onClick={() => moveChapter(i, 1)} disabled={isLastChapter(i)} title="Move down in list">▼</button>
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 600, fontSize: 14, display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 6 }}>
                          Ch. {i + 1}: {c.title}
                          {isLastChapter(i) && book.showPatreonOnLast &&
                            <span style={{ fontSize: 11, background: '#f3e8ff', color: '#7c3aed', padding: '2px 8px', borderRadius: 99 }}>
                              🔥 Patreon here
                            </span>
                          }
                        </div>
                        {c.content &&
                          <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginTop: 2, overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>
                            {c.content.substring(0, 120)}…
                          </div>
                        }
                      </div>
                      {/* Edit + Delete */}
                      <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                        <button className="btn-ghost" style={{ fontSize: 12, padding: '5px 10px' }}
                          onClick={() => startEdit(i)} title="Edit chapter">✏ Edit</button>
                        <button className="btn-danger" onClick={() => deleteChapter(i)} title="Delete chapter">✕</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          <hr className="section-divider" />
          <button className="btn-danger" onClick={deleteBook} style={{ fontSize: 13 }}>
            🗑 Delete Book
          </button>
        </div>
      )}
    </div>
  );
}

function Admin({ data, setData, pushToGitHub }) {
  const [logged, setLogged] = React.useState(false);
  const [pass, setPass] = React.useState("");
  const [passErr, setPassErr] = React.useState(false);
  const [adminTab, setAdminTab] = React.useState('books'); // 'books' | 'analytics'
  const [form, setForm] = React.useState({
    title: "", author: "", synopsis: "",
    cover: "", status: "ongoing", patreon: "", showPatreonOnLast: false
  });
  const coverInputRef = React.useRef();

  function login() {
    if (pass === ADMIN_PASSWORD) { setLogged(true); setPassErr(false); }
    else setPassErr(true);
  }

  function exportAllBooks() {
    // Read directly from localStorage to get the full, unmodified payload
    const raw = localStorage.getItem("ink-data-v2");
    if (!raw) { alert("No data found in localStorage (ink-data-v2)."); return; }
    let parsed;
    try { parsed = JSON.parse(raw); } catch { alert("Data in localStorage is corrupted."); return; }
    const bookCount = (parsed.books || []).length;
    const chapterCount = (parsed.books || []).reduce((s, b) => s + (b.chapters || []).length, 0);
    if (!confirm(`Export ALL data?\n\n📚 ${bookCount} book(s)\n📄 ${chapterCount} total chapter(s)\n\nThis includes covers, synopses, chapters, and all settings.`)) return;
    const blob = new Blob([JSON.stringify(parsed, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `ink-escapism-all-books-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleCoverUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm({ ...form, cover: ev.target.result });
    reader.readAsDataURL(file);
  }

  function addBook() {
    if (!form.title.trim()) return alert("Please enter a title.");
    setData({
      ...data,
      books: [...data.books, { ...form, id: Date.now().toString(), chapters: [], recommendations: [] }]
    });
    setForm({ title: "", author: "", synopsis: "", cover: "", status: "ongoing", patreon: "", showPatreonOnLast: false });
  }

  if (!logged) return (
    <div style={{ maxWidth: 360, margin: '80px auto', padding: '0 16px' }}>
      <h2 style={{ fontWeight: 800, fontSize: 22, marginBottom: 4, color: 'var(--ink-text)' }}>Admin Login</h2>
      <p style={{ color: 'var(--ink-muted)', fontSize: 14, marginBottom: 20 }}>Enter your admin password to continue.</p>
      <label className="admin-label">Password</label>
      <input className="admin-input" type="password" style={{ marginBottom: 12 }}
        value={pass} placeholder="••••••••"
        onChange={e => setPass(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && login()} />
      {passErr && <p style={{ color: '#dc2626', fontSize: 13, marginBottom: 10 }}>Incorrect password.</p>}
      <button className="btn-primary" onClick={login} style={{ width: '100%' }}>Login</button>
    </div>
  );

  return (
    <div style={{ maxWidth: 800, margin: '0 auto', padding: '40px 16px' }}>
      <h2 style={{ fontWeight: 800, fontSize: 24, marginBottom: 4, color: 'var(--ink-text)' }}>Admin Panel</h2>
      <p style={{ color: 'var(--ink-muted)', fontSize: 14, marginBottom: 20 }}>Add books, manage chapters, and configure Patreon links.</p>

      {/* ── Tab switcher ── */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 28, borderBottom: '1px solid var(--ink-border)', paddingBottom: 0 }}>
        {[{ id: 'books', label: '📚 Books' }, { id: 'analytics', label: '📊 Analytics' }].map(tab => (
          <button
            key={tab.id}
            onClick={() => setAdminTab(tab.id)}
            style={{
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '10px 18px', fontWeight: 700, fontSize: 14,
              color: adminTab === tab.id ? '#7c3aed' : 'var(--ink-muted)',
              borderBottom: adminTab === tab.id ? '3px solid #7c3aed' : '3px solid transparent',
              marginBottom: -1, transition: 'color 0.15s',
            }}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* ── Analytics tab ── */}
      {adminTab === 'analytics' && <AnalyticsDashboard data={data} />}

      {/* ── Books tab ── */}
      {adminTab === 'books' && (<>

      {/* ── GitHub Publish Panel ── */}
      <div style={{ border: '2px solid #7c3aed', borderRadius: 12, background: 'var(--ink-card)', padding: 18, marginBottom: 24 }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>☁️ Publish to GitHub</div>
        <div style={{ fontSize: 13, color: 'var(--ink-muted)', marginBottom: 14, lineHeight: 1.6 }}>
          After adding or editing books and chapters, tap the button below to push your changes live. Readers will see the updates immediately.
        </div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>
          <button
            onClick={() => pushToGitHub(data)}
            style={{
              background: '#7c3aed', color: '#fff', border: 'none',
              borderRadius: 8, padding: '11px 22px',
              fontWeight: 700, fontSize: 14, cursor: 'pointer',
              boxShadow: '0 4px 14px rgba(124,58,237,0.35)'
            }}>
            🚀 Publish Changes
          </button>
          <div style={{ flex: 1 }}>
            <label style={{
              background: 'var(--ink-accent)', color: 'var(--ink-accent-text)', borderRadius: 8,
              padding: '11px 16px', fontWeight: 700, fontSize: 13,
              cursor: 'pointer', display: 'inline-block'
            }}>
              📂 Import JSON (Restore Backup)
              <input type="file" accept=".json" style={{ display: 'none' }} onChange={e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                  try {
                    const parsed = JSON.parse(ev.target.result);
                    if (!parsed.books) { alert("Invalid file — no books found."); return; }
                    if (confirm("Import " + parsed.books.length + " book(s)? Tap Publish after to go live.")) {
                      setData(parsed);
                    }
                  } catch { alert("Could not read file. Make sure it is a valid JSON file."); }
                };
                reader.readAsText(file);
                e.target.value = '';
              }} />
            </label>
          </div>
        </div>
      </div>

      {/* ── Export / Backup ── */}
      <div style={{ border: '1px solid var(--ink-border)', borderRadius: 14, background: 'var(--ink-card)', padding: 18, marginBottom: 28, display: 'flex', alignItems: 'center', gap: 18, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 220 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4, color: 'var(--ink-text)' }}>📦 Export / Backup</div>
          <div style={{ fontSize: 13, color: 'var(--ink-muted)' }}>Download all your books as a backup JSON file.</div>
          <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginTop: 4 }}>
            📚 {data.books.length} book(s) · 📄 {data.books.reduce((s,b)=>s+(b.chapters||[]).length,0)} chapter(s)
          </div>
        </div>
        <button
          onClick={exportAllBooks}
          style={{
            background: 'var(--ink-accent)', color: 'var(--ink-accent-text)',
            border: 'none', borderRadius: 10,
            padding: '10px 18px', fontWeight: 700,
            fontSize: 13, cursor: 'pointer',
            whiteSpace: 'nowrap', flexShrink: 0,
          }}
        >
          ⬇ Download Backup
        </button>
      </div>

      {/* Add Book Form */}
      <div style={{ border: '1px solid var(--ink-border)', borderRadius: 14, background: 'var(--ink-card)', padding: 22, marginBottom: 36 }}>
        <h3 style={{ fontWeight: 700, fontSize: 17, marginBottom: 18, color: 'var(--ink-text)' }}>➕ Add New Book</h3>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
          <div>
            <label className="admin-label">Title *</label>
            <input className="admin-input" placeholder="Novel title"
              value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} />
          </div>
          <div>
            <label className="admin-label">Author</label>
            <input className="admin-input" placeholder="Author name"
              value={form.author} onChange={e => setForm({ ...form, author: e.target.value })} />
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <label className="admin-label">Synopsis</label>
          <textarea className="admin-input" placeholder="Book description…" rows={4}
            value={form.synopsis} onChange={e => setForm({ ...form, synopsis: e.target.value })} />
        </div>

        {/* Cover upload */}
        <div style={{ marginBottom: 14 }}>
          <label className="admin-label">Cover Image</label>
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', flexWrap: 'wrap' }}>
            <div>
              <button className="btn-ghost" onClick={() => coverInputRef.current?.click()} style={{ marginBottom: 6 }}>
                📂 Upload from Computer
              </button>
              <input ref={coverInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleCoverUpload} />
              <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginBottom: 4 }}>— or paste a URL below —</div>
              <input className="admin-input" placeholder="https://…" style={{ width: 300 }}
                value={form.cover.startsWith('data:') ? '(uploaded image)' : form.cover}
                onChange={e => setForm({ ...form, cover: e.target.value })} />
            </div>
            {form.cover &&
              <img src={form.cover} style={{ width: 70, height: 95, objectFit: 'cover', borderRadius: 8, border: '1px solid var(--ink-border)' }}
                   onError={e => e.target.style.display='none'} />
            }
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
          <div>
            <label className="admin-label">Status</label>
            <select className="admin-input" value={form.status}
              onChange={e => setForm({ ...form, status: e.target.value })}>
              <option value="ongoing">Ongoing</option>
              <option value="completed">Completed</option>
              <option value="upcoming">Upcoming</option>
            </select>
          </div>
          <div>
            <label className="admin-label">Patreon Link</label>
            <input className="admin-input" placeholder="https://patreon.com/…"
              value={form.patreon} onChange={e => setForm({ ...form, patreon: e.target.value })} />
          </div>
        </div>

        <div style={{ marginBottom: 18 }}>
          <Toggle
            on={form.showPatreonOnLast}
            onToggle={() => setForm({ ...form, showPatreonOnLast: !form.showPatreonOnLast })}
            label="Show Patreon button after last chapter"
          />
        </div>

        <button className="btn-primary" onClick={addBook}>Add Book</button>
      </div>

      {/* Book list */}
      <h3 style={{ fontWeight: 700, fontSize: 17, marginBottom: 14, color: 'var(--ink-text)' }}>
        📚 Your Books ({data.books.length})
      </h3>
      {data.books.length === 0 &&
        <p style={{ color: 'var(--ink-muted)', fontSize: 14 }}>No books yet. Add one above.</p>
      }
      {data.books.map(b => (
        <AdminBookCard key={b.id} book={b} data={data} setData={setData} />
      ))}
    </div>
    </>)}
    </div>
  );
}

/* ─── App Shell ───────────────────────────────────────────── */
function App() {
  const [data, setData, pushToGitHub, syncMsg, synced] = useStorage();
  const [dark, setDark] = React.useState(false);
  const [route, setRoute] = React.useState(location.hash);

  React.useEffect(() => {
    const handler = () => setRoute(location.hash);
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  let page;
  if (route.startsWith("#/admin"))      page = <Admin data={data} setData={setData} pushToGitHub={pushToGitHub} />;
  else if (route.startsWith("#/book/")) page = <BookPage data={data} />;
  else if (route.startsWith("#/read/")) page = <Reader data={data} />;
  else if (route.startsWith("#/more/")) page = <Home data={data} />;
  else                                  page = <Home data={data} />;

  return (
    <div className={dark ? 'dark-mode' : ''} style={{ minHeight: '100vh', background: 'var(--ink-bg)', color: 'var(--ink-text)' }}>
      <Header dark={dark} setDark={setDark} />
      {syncMsg ? (
        <div style={{
          position: 'fixed', bottom: 20, left: '50%', transform: 'translateX(-50%)',
          background: '#111', color: '#fff', padding: '10px 20px',
          borderRadius: 99, fontSize: 13, fontWeight: 600,
          zIndex: 9999, boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
          whiteSpace: 'nowrap'
        }}>{syncMsg}</div>
      ) : null}
      {!synced ? (
        <div style={{ textAlign: 'center', padding: 80, color: 'var(--ink-muted)', fontSize: 16 }}>
          ⏳ Loading books…
        </div>
      ) : page}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
