<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ink Escapism</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: Inter, sans-serif; }
.title-font { font-family: Cinzel, serif; }
</style>
</head>

<body class="bg-white">
<div id="root"></div>

<script type="text/babel">

const ADMIN_PASSWORD = "changeme";

function useStorage(){
  const [data,setData] = React.useState(()=>{
    const saved = localStorage.getItem("ink-data");
    return saved ? JSON.parse(saved) : {books:[]};
  });
  React.useEffect(()=>{
    localStorage.setItem("ink-data", JSON.stringify(data));
  },[data]);
  return [data,setData];
}

function Header({dark,setDark}){
  return (
    <div className="border-b">
      <div className="text-center py-8">
        <h1 className="title-font text-5xl">Ink Escapism</h1>
        <p className="text-gray-500">Chinese Webnovel Translations</p>
      </div>
      <img src="header-art.jpg" className="w-full max-h-[300px] object-cover"/>
      <div className="text-center py-2">
        <button onClick={()=>setDark(!dark)}
          className="border px-3 py-1 rounded">
          Toggle Dark Mode
        </button>
      </div>
    </div>
  )
}

function Home({data}){
  const section = s => data.books.filter(b=>b.status===s);
  return (
    <div className="max-w-6xl mx-auto p-4">
      <Section title="Ongoing Translations" books={section("ongoing")}/>
      <Section title="Completed Translations" books={section("completed")}/>
      <Section title="Upcoming Translations" books={section("upcoming")}/>
    </div>
  )
}

function Section({title,books}){
  if(!books.length) return null;
  return (
    <div className="mb-10">
      <h2 className="text-2xl font-semibold mb-4">{title}</h2>
      <div className="grid md:grid-cols-3 gap-4">
        {books.map(b=>(
          <a key={b.id}
             href={`#/book/${b.id}`}
             className="border rounded-xl overflow-hidden hover:shadow">
            {b.cover && <img src={b.cover} className="h-48 w-full object-cover"/>}
            <div className="p-3">
              <h3 className="font-semibold">{b.title}</h3>
              <p className="text-sm text-gray-500">{b.author}</p>
            </div>
          </a>
        ))}
      </div>
    </div>
  )
}

function BookPage({data}){
  const id = location.hash.split("/")[2];
  const book = data.books.find(b=>b.id===id);
  if(!book) return <div/>;
  return (
    <div className="max-w-4xl mx-auto p-4">
      <h1 className="text-3xl font-bold mb-2">{book.title}</h1>
      <p className="text-gray-500 mb-4">Author: {book.author}</p>
      {book.patreon &&
        <a href={book.patreon} target="_blank"
          className="block bg-purple-600 text-white text-center py-2 rounded mb-4">
          Read Advanced Chapters
        </a>
      }
      <p className="mb-6 whitespace-pre-wrap">{book.synopsis}</p>
      <a href={`#/read/${book.id}`}
        className="bg-black text-white px-4 py-2 rounded">
        Read
      </a>
    </div>
  )
}

function Reader({data}){
  const id = location.hash.split("/")[2];
  const book = data.books.find(b=>b.id===id);
  if(!book) return <div/>;
  return (
    <div className="max-w-3xl mx-auto p-4">
      {book.chapters.map((c,i)=>(
        <div key={i} className="border p-3 mb-3 rounded">
          <h3 className="font-semibold">{c.title}</h3>
          <p className="whitespace-pre-wrap">{c.content}</p>
          {c.donation &&
            <a href={c.donation} target="_blank"
              className="block text-center bg-black text-white py-1 mt-2 rounded">
              Read Advanced Chapters
            </a>
          }
        </div>
      ))}
    </div>
  )
}

function Admin({data,setData}){
  const [logged,setLogged] = React.useState(false);
  const [pass,setPass] = React.useState("");
  const [form,setForm] = React.useState({
    title:"",author:"",synopsis:"",
    cover:"",status:"ongoing",patreon:""
  });

  if(!logged)
    return (
      <div className="max-w-md mx-auto p-4">
        <input type="password"
          className="border p-2 w-full"
          onChange={e=>setPass(e.target.value)}/>
        <button
          onClick={()=>pass==="changeme" && setLogged(true)}
          className="mt-2 bg-black text-white px-4 py-2">
          Login
        </button>
      </div>
    );

  function addBook(){
    setData({
      ...data,
      books:[...data.books,{...form,id:Date.now().toString(),chapters:[]}]
    });
  }

  function addChapter(id){
    const title = prompt("Chapter title");
    const content = prompt("Content");
    const donation = prompt("Advanced link");
    setData({
      ...data,
      books:data.books.map(b=>
        b.id===id ? {...b,chapters:[...b.chapters,{title,content,donation}]} : b
      )
    })
  }

  return (
    <div className="max-w-4xl mx-auto p-4 space-y-2">
      <input placeholder="Title"
        className="border p-2 w-full"
        onChange={e=>setForm({...form,title:e.target.value})}/>
      <input placeholder="Author"
        className="border p-2 w-full"
        onChange={e=>setForm({...form,author:e.target.value})}/>
      <textarea placeholder="Synopsis"
        className="border p-2 w-full"
        onChange={e=>setForm({...form,synopsis:e.target.value})}/>
      <input placeholder="Cover URL"
        className="border p-2 w-full"
        onChange={e=>setForm({...form,cover:e.target.value})}/>
      <input placeholder="Patreon Link"
        className="border p-2 w-full"
        onChange={e=>setForm({...form,patreon:e.target.value})}/>
      <select className="border p-2"
        onChange={e=>setForm({...form,status:e.target.value})}>
        <option value="ongoing">Ongoing</option>
        <option value="completed">Completed</option>
        <option value="upcoming">Upcoming</option>
      </select>
      <button onClick={addBook}
        className="bg-black text-white px-4 py-2">
        Add Book
      </button>

      {data.books.map(b=>(
        <div key={b.id} className="border p-3">
          {b.title}
          <button
            className="ml-3 text-blue-600"
            onClick={()=>addChapter(b.id)}>
            Add Chapter
          </button>
        </div>
      ))}
    </div>
  )
}

function App(){
  const [data,setData] = useStorage();
  const [dark,setDark] = React.useState(false);

  const route = location.hash;

  let page;
  if(route.startsWith("#/admin"))
    page = <Admin data={data} setData={setData}/>;
  else if(route.startsWith("#/book/"))
    page = <BookPage data={data}/>;
  else if(route.startsWith("#/read/"))
    page = <Reader data={data}/>;
  else
    page = <Home data={data}/>;

  return (
    <div className={dark ? "dark text-white bg-gray-900 min-h-screen" : "min-h-screen"}>
      <Header dark={dark} setDark={setDark}/>
      {page}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
