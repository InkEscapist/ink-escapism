<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webnovel Site</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { font-family: Arial; padding:20px; }
.book { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
button { padding:10px; margin-top:10px; }
</style>
</head>
<body>

<h1>My Webnovel Site</h1>

<button onclick="startUpload()">Upload Books</button>

<h2>Books</h2>
<div id="booksContainer"></div>

<script>
const SUPABASE_URL = "https://gwonpfnvrbvykgsgpnaq.supabase.co";
const SUPABASE_KEY = "sb_publishable_afqxmXgBz-skY4SplAZmvA_4n2sSr5D";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let booksData = [];

// LOAD BOOKS
async function loadBooks() {
    const { data, error } = await supabaseClient
        .from("books")
        .select("*");

    if (error) {
        console.error("LOAD ERROR:", error);
        alert("Error loading books");
        return;
    }

    booksData = data || [];
    renderBooks();
}

// RENDER
function renderBooks() {
    const container = document.getElementById("booksContainer");
    container.innerHTML = "";

    if (booksData.length === 0) {
        container.innerHTML = "<p>No books found yet.</p>";
        return;
    }

    booksData.forEach(row => {
        const book = row.data; // 🔥 IMPORTANT FIX

        if (!book) return;

        const div = document.createElement("div");
        div.className = "book";
        div.innerHTML = `
            <h3>${book.title || 'No Title'}</h3>
            <p>${book.description || ''}</p>
        `;
        container.appendChild(div);
    });
}

// UPLOAD JSON TO SUPABASE
async function uploadJSONToSupabase(jsonData) {
    const booksArray = Array.isArray(jsonData) ? jsonData : jsonData.books;

    if (!booksArray) {
        alert("JSON format not recognized");
        return;
    }

    for (const book of booksArray) {
        const { error } = await supabaseClient
            .from("books")
            .insert([{ data: book }]); // 🔥 IMPORTANT FIX

        if (error) {
            console.error("Insert error:", error);
            alert("Insert failed: " + error.message);
            return;
        }
    }

    alert("Upload complete!");
    loadBooks();
}

// START UPLOAD
async function startUpload() {
    alert("Upload started...");

    try {
        const response = await fetch("./ink-escapism-books.json");

        if (!response.ok) {
            alert("JSON file not found");
            return;
        }

        const data = await response.json();

        alert("JSON loaded successfully!");

        const booksArray = data.books;

        if (!booksArray || booksArray.length === 0) {
            alert("No books found in JSON");
            return;
        }

        alert("Uploading " + booksArray.length + " books...");

        for (const book of booksArray) {
            const { error } = await supabaseClient
                .from("books")
                .insert([{ data: book }]);

            if (error) {
                alert("INSERT ERROR: " + error.message);
                console.error(error);
                return;
            }
        }

        alert("Upload complete!");
        loadBooks();

    } catch (err) {
        alert("CRASH: " + err.message);
        console.error(err);
    }
}

        const text = await response.text();
        alert("Raw JSON loaded!");

        const data = JSON.parse(text);
        alert("JSON parsed successfully!");

        await uploadJSONToSupabase(data);

    } catch (err) {
        alert("ERROR: " + err.message);
        console.error(err);
    }
}

        const data = await response.json();
        await uploadJSONToSupabase(data);

    } catch (err) {
        console.error(err);
        alert("Error loading JSON file");
    }
}

// LOAD ON START
loadBooks();
</script>

</body>
</html>
