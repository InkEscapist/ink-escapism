<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webnovel Site</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { font-family: Arial; padding:20px; }
.book { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
button { padding:10px; margin-top:10px; }
</style>
</head>
<body>

<h1>My Webnovel Site</h1>

<button onclick="startUpload()">Upload Books</button>

<h2>Books</h2>
<div id="booksContainer"></div>

<script>
const SUPABASE_URL = "https://gwonpfnvrbvykgsgpnaq.supabase.co";
const SUPABASE_KEY = "sb_publishable_afqxmXgBz-skY4SplAZmvA_4n2sSr5D";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let booksData = [];

// LOAD BOOKS
async function loadBooks() {
    try {
        const { data, error } = await supabaseClient
            .from("books")
            .select("*");

        if (error) {
            alert("LOAD ERROR: " + error.message);
            return;
        }

        booksData = data || [];
        renderBooks();
    } catch (err) {
        alert("LOAD CRASH: " + err.message);
    }
}

// RENDER
function renderBooks() {
    const container = document.getElementById("booksContainer");
    container.innerHTML = "";

    if (booksData.length === 0) {
        container.innerHTML = "<p>No books found yet.</p>";
        return;
    }

    booksData.forEach(row => {
        const book = row.data;

        if (!book) return;

        const div = document.createElement("div");
        div.className = "book";
        div.innerHTML = `
            <h3>${book.title || 'No Title'}</h3>
            <p>${book.description || ''}</p>
        `;
        container.appendChild(div);
    });
}

// UPLOAD JSON
async function uploadJSONToSupabase(jsonData) {
    try {
        const booksArray = Array.isArray(jsonData) ? jsonData : jsonData.books;

        if (!booksArray) {
            alert("JSON format not recognized");
            return;
        }

        for (const book of booksArray) {
            const { error } = await supabaseClient
                .from("books")
                .insert([{ data: book }]);

            if (error) {
                alert("INSERT ERROR: " + error.message);
                return;
            }
        }

        alert("Upload complete!");
        loadBooks();

    } catch (err) {
        alert("UPLOAD CRASH: " + err.message);
    }
}

// START UPLOAD
async function startUpload() {
    alert("Upload started...");

    try {
        const response = await fetch("./ink-escapism-books.json");

        alert("Fetch status: " + response.status);

        if (!response.ok) {
            alert("Could not find JSON file");
            return;
        }

        const text = await response.text();
        alert("Raw JSON loaded!");

        const data = JSON.parse(text);
        alert("JSON parsed successfully!");

        await uploadJSONToSupabase(data);

    } catch (err) {
        alert("ERROR: " + err.message);
    }
}

loadBooks();
</script>

</body>
</html>
